<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Salimos?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section class="card">
      <p class="tag">Una pequeña pregunta...</p>

      <h1>¿Quieres salir conmigo?</h1>

      <p class="text">
        Prometo que será algo bonito, tranquilo y especial.
      </p>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="plans">
        <button class="plan active" onclick="selectPlan(this, 'Café y postre')">
          ☕ Café y postre
        </button>
        <button class="plan" onclick="selectPlan(this, 'Cine')">
          🎬 Cine
        </button>
        <button class="plan" onclick="selectPlan(this, 'Cena')">
          🍕 Cena
        </button>
      </div>

      <div class="date-box">
        <label>Elige fecha</label>
        <input type="date" id="date" />

        <label>Elige hora</label>
        <input type="time" id="time" />
      </div>

      <div class="buttons">
        <button class="yes" onclick="acceptInvite()">Sí 💖</button>
        <button class="no" id="noBtn">No 😅</button>
      </div>

      <div class="result" id="result"></div>
    </section>
  </main>

  <canvas id="confetti"></canvas>

  <script src="script.js"></script>
</body>
</html>
